<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OSINT Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* จัดการเรื่อง Scroll ของฉากหลัง */
        body.modal-active {
            overflow-x: hidden;
            overflow-y: hidden !important;
        }
        /* แอนิเมชันพื้นหลัง Pop-up */
        .modal-backdrop-anim {
            transition: opacity 0.3s ease-out;
        }
        /* แอนิเมชันตัวกล่อง Pop-up (เด้งซูม) */
        .modal-box-anim {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="bg-[#f8f9fa] font-sans leading-normal tracking-normal pb-40">

    <header class="w-full text-center py-10 bg-white shadow-sm mb-6 rounded-b-3xl">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600">
            OSINT Intelligence
        </h1>
        <p class="text-sm text-gray-500 mt-2 font-medium">ศูนย์รวมเครื่องมือสืบค้นและวิเคราะห์ข้อมูลเปิดสาธารณะ</p>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        <div id="tools-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-10">
            </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 p-4 text-center z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] rounded-t-3xl">
        <p class="text-xs text-gray-500 mb-2 font-medium">สแกนเพื่อบันทึกหรือแชร์หน้า Dashboard นี้</p>
        <img src="QR.png" alt="QR Code" class="w-24 h-auto mx-auto border-2 border-purple-100 rounded-xl p-1 shadow-sm">
        <p class="text-[10px] text-gray-400 mt-2">&copy; 2026 OSINT Tools Dashboard</p>
    </footer>

    <div id="modal-backdrop" class="modal-backdrop-anim opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 px-4">
        <div class="absolute w-full h-full bg-gray-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div id="modal-box" class="modal-box-anim transform scale-75 opacity-0 bg-white w-full max-w-sm mx-auto rounded-[2rem] shadow-2xl z-50 overflow-hidden">
            
            <div class="relative bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 pt-8 pb-6 px-6 text-center">
                <div class="absolute top-4 right-4 cursor-pointer bg-white/50 hover:bg-white p-2 rounded-full transition-colors" onclick="closeModal()">
                    <svg class="fill-current text-gray-600" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 18 18">
                        <path d="M14.53 4.53l-1.06-1.06L9 7.94 4.53 3.47 3.47 4.53 7.94 9l-4.47 4.47 1.06 1.06L9 10.06l4.47 4.47 1.06-1.06L10.06 9z"></path>
                    </svg>
                </div>
                
                <div class="inline-block bg-white p-3 rounded-2xl shadow-sm mb-3">
                    <img id="modal-icon-display" src="" alt="Icon" class="w-14 h-14 object-contain">
                </div>
                <h2 id="modal-title" class="text-2xl font-bold text-gray-800"></h2>
            </div>

            <div class="p-6 bg-white">
                <div class="bg-gray-50 rounded-2xl p-4 mb-6 border border-gray-100 shadow-inner">
                    <p id="modal-desc" class="text-[13px] text-gray-600 leading-relaxed text-center"></p>
                </div>
                
                <a id="modal-link" href="#" target="_blank" class="block w-full py-3.5 px-4 bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-600 hover:to-purple-600 text-white font-bold text-center rounded-2xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                    ✨ เปิดใช้งานเครื่องมือ ✨
                </a>
            </div>
        </div>
    </div>

    <script>
        const fallbackIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239CA3AF'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'%3E%3C/path%3E%3C/svg%3E";

        const osintTools = [
            {
                name: "OSINT Framework",
                shortDesc: "โครงสร้างการสืบค้น",
                icon: "https://icon.horse/icon/osintframework.com",
                url: "https://osintframework.com/",
                detail: "แผนผังรวบรวมเครื่องมือ OSINT ที่จัดหมวดหมู่ไว้อย่างเป็นระบบ เหมาะสำหรับผู้เริ่มต้นที่ต้องการหาว่าต้องใช้เครื่องมือไหนในการสืบหาข้อมูลประเภทต่างๆ (เช่น อีเมล, โดเมน, IP, โซเชียลมีเดีย)"
            },
            {
                name: "Webmii",
                shortDesc: "ค้นหาชื่อบนเว็บ",
                icon: "https://icon.horse/icon/webmii.com",
                url: "https://webmii.com/",
                detail: "พิมพ์ชื่อ-นามสกุลของเป้าหมายลงไป ระบบจะไปกวาดข้อมูลจากเว็บไซต์, ข่าว, โซเชียลมีเดีย และเอกสารสาธารณะต่างๆ ทั่วอินเทอร์เน็ตมารวมไว้ในหน้าเดียว พร้อมประเมินคะแนนการมีตัวตนบนโลกออนไลน์"
            },
            {
                name: "Have I Been Pwned",
                shortDesc: "เช็ค Data หลุด",
                icon: "https://icon.horse/icon/haveibeenpwned.com",
                url: "https://haveibeenpwned.com/",
                detail: "ตรวจสอบว่าอีเมลหรือ 'เบอร์โทรศัพท์' ของเป้าหมายเคยหลุดออกมาจากฐานข้อมูลที่ถูกแฮกหรือไม่ ทำให้รู้ได้ว่าเป้าหมายใช้เบอร์นี้สมัครบริการอะไรไว้บ้าง (ใส่เบอร์ไทยแบบ +66)"
            },
            {
                name: "PimEyes",
                shortDesc: "ค้นหาใบหน้า",
                icon: "https://icon.horse/icon/pimeyes.com",
                url: "https://pimeyes.com/en",
                detail: "สุดยอดเครื่องมือค้นหาใบหน้าด้วย AI เพียงอัปโหลดรูปภาพ ระบบจะสแกนหาใบหน้าที่ตรงกันจากภาพต่างๆ ทั่วอินเทอร์เน็ต ใช้สืบหาตัวตนหรือบัญชีโซเชียลมีเดียอื่นๆ ของบุคคลนั้นได้"
            },
            {
                name: "Betaface",
                shortDesc: "เทียบหน้า 2 รูป",
                icon: "https://icon.horse/icon/betafaceapi.com",
                url: "https://www.betafaceapi.com/v2/demo/#compare",
                detail: "เครื่องมือวิเคราะห์และเปรียบเทียบใบหน้า (Face Comparison) อัปโหลดรูปภาพ 2 รูปเพื่อตรวจสอบว่าเป็นบุคคลคนเดียวกันหรือไม่ โดยระบบจะวิเคราะห์โครงสร้างใบหน้าและบอกเปอร์เซ็นต์ความคล้ายคลึง"
            },
            {
                name: "WhatsMyName",
                shortDesc: "ตามรอย Username",
                icon: "https://icon.horse/icon/whatsmyname.app",
                url: "https://whatsmyname.app/",
                detail: "หากคุณรู้แค่ 'นามแฝง' (Username) ของเป้าหมาย เครื่องมือนี้จะนำชื่อนั้นไปสแกนหาในเว็บไซต์นับร้อยแห่ง เพื่อดูว่าเจ้าตัวแอบไปเปิดบัญชีทิ้งไว้ที่แพลตฟอร์มไหนบ้าง"
            },
            {
                name: "CommentPicker",
                shortDesc: "หา Social ID",
                icon: "https://icon.horse/icon/commentpicker.com",
                url: "https://commentpicker.com/",
                detail: "ใช้สำหรับค้นหาค่า ID (ตัวเลขที่ซ่อนอยู่) ของบัญชี Facebook, Instagram หรือ YouTube ซึ่งจำเป็นมากในการนำไปใช้ร่วมกับเครื่องมือสืบค้นเฉพาะทางตัวอื่นๆ"
            },
            {
                name: "Jimpl",
                shortDesc: "เช็คพิกัดภาพ (Exif)",
                icon: "https://icon.horse/icon/jimpl.com",
                url: "https://jimpl.com/",
                detail: "เครื่องมืออ่านข้อมูล Metadata (Exif) ที่ซ่อนอยู่ในไฟล์รูปภาพ เพียงอัปโหลดรูป คุณอาจได้ข้อมูลพิกัด GPS ว่าถ่ายที่ไหน, ถ่ายด้วยกล้องหรือมือถือรุ่นอะไร, และถ่ายเมื่อไหร่"
            },
            {
                name: "FotoForensics",
                shortDesc: "วิเคราะห์ภาพตัดต่อ",
                icon: "https://icon.horse/icon/fotoforensics.com",
                url: "https://fotoforensics.com/",
                detail: "เครื่องมือวิเคราะห์ภาพถ่ายเชิงลึก (Error Level Analysis) เพื่อตรวจสอบว่ารูปภาพเป้าหมายผ่านการตัดต่อ ดัดแปลง หรือถูกบิดเบือนรายละเอียดจุดไหนมาหรือไม่"
            },
            {
                name: "HereWeGo",
                shortDesc: "แผนที่ & บ้านเลขที่",
                icon: "https://icon.horse/icon/here.com",
                url: "https://wego.here.com/",
                detail: "แพลตฟอร์มแผนที่ทางเลือกที่มีความละเอียดสูงในบางพื้นที่ จุดเด่นคือการแสดงโครงสร้างอาคารและ 'เลขที่บ้าน' ที่บางครั้ง Google Maps อาจไม่ได้ระบุไว้อย่างชัดเจน"
            },
            {
                name: "Shadowmap",
                shortDesc: "วิเคราะห์แสงเงา",
                icon: "https://icon.horse/icon/shadowmap.org",
                url: "https://app.shadowmap.org/",
                detail: "จำลองทิศทางของแสงแดดและเงาแบบ 3 มิติตามเวลาจริงทั่วโลก มีประโยชน์มากในการตรวจสอบว่ารูปภาพเป้าหมายถูกถ่ายในช่วงเวลาใด โดยดูจากทิศทางและมุมของเงา"
            },
            {
                name: "IntelTech",
                shortDesc: "ศูนย์รวมเครื่องมือ",
                icon: "https://icon.horse/icon/inteltechniques.com",
                url: "https://inteltechniques.com/tools/Search.html",
                detail: "แหล่งรวบรวมเครื่องมือสืบค้นข้อมูลระดับแอดวานซ์จากผู้เชี่ยวชาญด้าน OSINT โดยเฉพาะ มีช่องค้นหาให้กรอกข้อมูลและสืบเจาะลึกได้ในทุกมิติ ทั้งเบอร์โทร อีเมล และโดเมน"
            },
            {
                name: "Blacklistseller",
                shortDesc: "เช็คคนโกง",
                icon: "https://icon.horse/icon/blacklistseller.com",
                url: "https://www.blacklistseller.com/",
                detail: "ฐานข้อมูลเตือนภัยมิจฉาชีพของไทย ใช้ค้นหาชื่อ-นามสกุล หรือเลขบัญชีธนาคาร เพื่อตรวจสอบว่าบุคคลนั้นมีประวัติการฉ้อโกง หรือเคยถูกผู้อื่นแจ้งความอายัดบัญชีไว้หรือไม่"
            },
            {
                name: "DorkGPT",
                shortDesc: "สร้างคำค้นหาลึก",
                icon: "https://icon.horse/icon/dorkgpt.com",
                url: "https://www.dorkgpt.com/",
                detail: "AI ช่วยเขียนคำสั่ง 'Google Dork' ให้คุณไม่ต้องจำสูตรเอง แค่บอกว่าอยากหาอะไร (เช่น หาไฟล์ PDF ประวัติพนักงานบริษัท X) AI จะสร้างคำค้นหาเฉพาะทางไปให้แปะใน Google ทันที"
            }
        ];

        const container = document.getElementById('tools-container');

        osintTools.forEach((tool, index) => {
            const card = document.createElement('div');
            // ทำการ์ดให้น่ารักขึ้น ขอบมน เงานุ่มๆ
            card.className = "bg-white rounded-3xl p-5 flex flex-col items-center justify-center text-center cursor-pointer shadow-[0_4px_15px_rgba(0,0,0,0.03)] hover:shadow-[0_8px_25px_rgba(0,0,0,0.08)] transform hover:-translate-y-1 transition-all duration-300 border border-transparent hover:border-purple-100";
            card.onclick = () => openModal(index);
            
            card.innerHTML = `
                <div class="bg-gradient-to-br from-gray-50 to-gray-100 p-3 rounded-2xl mb-3">
                    <img src="${tool.icon}" alt="${tool.name}" onerror="this.onerror=null; this.src=fallbackIcon;" class="w-10 h-10 object-contain mix-blend-multiply">
                </div>
                <h3 class="text-[13px] font-bold text-gray-800 leading-tight">${tool.name}</h3>
                <p class="text-[10px] text-gray-400 mt-1.5 font-medium">${tool.shortDesc}</p>
            `;
            container.appendChild(card);
        });

        function openModal(index) {
            const tool = osintTools[index];
            document.getElementById('modal-title').innerText = tool.name;
            document.getElementById('modal-desc').innerText = tool.detail;
            document.getElementById('modal-link').href = tool.url;
            
            // ดึงโลโก้มาใส่ใน Pop-up พร้อมดัก error กรณีโลโก้พัง
            const modalIcon = document.getElementById('modal-icon-display');
            modalIcon.src = tool.icon;
            modalIcon.onerror = function() { this.src = fallbackIcon; };
            
            // เปิด Backdrop
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            
            // เล่นแอนิเมชันเด้งซูมของกล่อง Pop-up
            const box = document.getElementById('modal-box');
            box.classList.remove('scale-75', 'opacity-0');
            box.classList.add('scale-100', 'opacity-100');
            
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            // ปิด Backdrop
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
            
            // หุบกล่อง Pop-up กลับ
            const box = document.getElementById('modal-box');
            box.classList.remove('scale-100', 'opacity-100');
            box.classList.add('scale-75', 'opacity-0');
            
            document.body.classList.remove('modal-active');
        }
    </script>

</body>
</html>
